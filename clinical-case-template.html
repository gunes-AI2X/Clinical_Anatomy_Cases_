  .format-icon { font-size: 28px; margin-bottom: 8px; }

  .btn { padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; border: 1.5px solid #ddd; background: #fff; color: #333; transition: all 0.15s; font-family: inherit; }

    sec.appendChild(scoreDiv);

    var nRow = el('div', { class: 'nav-row' });
    var backBtn = el('button', { class: 'btn' }, '← Back'); backBtn.onclick = function(){ goTo(2); };
    nRow.appendChild(backBtn);
    nRow.appendChild(el('span', { class: 'quiz-counter', id: 'quizProgress' }, '0 of ' + q.questions.length + ' answered'));
    sec.appendChild(nRow);
    return sec;
  }

  /* === SECTION 4 === */
  function buildSection4() {
    var a = d.activity;
    var sec = el('div', { class: 'section', id: 'sec4' });
    sec.appendChild(badge(a.badge, a.badgeColor, a.badgeTextColor));
    sec.appendChild(el('h2', { class: 'sec-title' }, a.title));
    sec.appendChild(el('p', { class: 'lead' }, a.lead));

    var fGrid = el('div', { class: 'format-grid' });
    a.formats.forEach(function(f) {
      var fc = el('div', { class: 'format-card' });
      fc.innerHTML = '<div class="format-icon">' + f.icon + '</div><div class="format-name">' + f.name + '</div><div class="format-desc">' + f.desc + '</div>';
      fc.onclick = function() {
        document.querySelectorAll('.format-card').forEach(function(c){ c.classList.remove('selected'); });
        fc.classList.add('selected');
        var rubricHTML = a.objectives.map(function(o) {
          return '<div class="rubric-item"><div class="rubric-check" onclick="this.classList.toggle(\'checked\')">✓</div><div class="rubric-text">' + o.text + '<small>' + o.hint + '</small></div></div>';
        }).join('');
        document.getElementById('rubricList').innerHTML = rubricHTML;
        document.getElementById('fmtGuideTitle').textContent = f.name + ' — Guidance';
        document.getElementById('fmtGuideContent').textContent = f.guidance;
        document.getElementById('fmtSubmission').innerHTML = '<strong>Submission:</strong> ' + f.submission;
        document.getElementById('rubricSection').style.display = 'block';
        document.getElementById('rubricSection').scrollIntoView({ behavior:'smooth', block:'start' });
      };
      fGrid.appendChild(fc);
    });
    sec.appendChild(fGrid);

    var rubSec = el('div', { id: 'rubricSection', style: 'display:none' });
    var rCard = el('div', { class: 'card' });
    rCard.innerHTML = '<div class="card-title">Required Learning Objectives — All Formats</div><p style="font-size:12px;color:#888;margin-bottom:14px">Check off each objective as you complete it in your chosen format.</p><div id="rubricList"></div>';
    rubSec.appendChild(rCard);
    var gCard = el('div', { class: 'card' });
    gCard.innerHTML = '<div class="card-title" id="fmtGuideTitle">Format Guidance</div><div id="fmtGuideContent" style="font-size:13px;line-height:1.7;color:#333"></div>';
    rubSec.appendChild(gCard);
    var infoBox = el('div', { class: 'info-box', id: 'fmtSubmission' });
    rubSec.appendChild(infoBox);
    sec.appendChild(rubSec);
    sec.appendChild(navRow(3, null, null));
    return sec;
  }

  /* === NAVIGATION === */
  function goTo(n) {
    document.getElementById('sec' + current).classList.remove('active');
    var oldP = document.getElementById('ps' + current);
    var oldL = document.getElementById('pl' + current);
    oldP.classList.remove('active');
    oldL.classList.remove('active');
    if (n > current) { oldP.classList.add('done'); oldL.classList.add('done'); }
    current = n;
    document.getElementById('sec' + n).classList.add('active');
    var newP = document.getElementById('ps' + n);
    var newL = document.getElementById('pl' + n);
    newP.classList.remove('done'); newP.classList.add('active'); newP.style.background = d.headerColor1;
    newL.classList.remove('done'); newL.classList.add('active'); newL.style.color = d.headerColor1;
    window.scrollTo(0, 0);
  }
  window.goTo = goTo;

  /* === QUIZ LOGIC === */
  function answerQ(qi, oi) {
    if (answered[qi] !== undefined) return;
    answered[qi] = oi;
    var opts = document.querySelectorAll('#q' + qi + ' .quiz-opt');
    opts.forEach(function(o, i) {
      o.disabled = true;
      if (i === correct[qi]) o.classList.add(oi === correct[qi] ? 'correct' : 'reveal');
    });
    if (oi !== correct[qi]) opts[oi].classList.add('wrong');
    var fb = document.getElementById('fb' + qi);
    fb.style.display = 'block';
    fb.className = 'quiz-feedback ' + (oi === correct[qi] ? 'correct' : 'wrong');
    fb.textContent = d.quiz.questions[qi].feedbackPerOption[oi];
    var count = Object.keys(answered).length;
    document.getElementById('quizProgress').textContent = count + ' of ' + d.quiz.questions.length + ' answered';
    if (count === d.quiz.questions.length) {
      var score = 0;
      for (var k in answered) { if (answered[k] === correct[k]) score++; }
      document.getElementById('scoreNum').textContent = score;
      document.getElementById('scoreMsg').textContent = d.quiz.scoreMessages[score] || '';
      document.getElementById('quizScore').style.display = 'block';
    }
  }
  window.answerQ = answerQ;

  /* === MOUNT === */
  function mount() {
    var root = document.getElementById('appRoot');
    root.appendChild(buildHeader());
    root.appendChild(buildProgress());
    var body = el('div', { class: 'app-body' });
    body.appendChild(buildSection0());
    body.appendChild(buildSection1());
    body.appendChild(buildSection2());
    body.appendChild(buildSection3());
    body.appendChild(buildSection4());
    root.appendChild(body);
    // Set initial progress bar color
    document.getElementById('ps0').style.background = d.headerColor1;
    document.getElementById('pl0').style.color = d.headerColor1;
  }

  document.addEventListener('DOMContentLoaded', mount);
})();
</script>
</body>
</html>
